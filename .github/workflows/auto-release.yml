name: Build Xcode Project

on:
  push:
    branches:
      - main  # Trigger on push to the main branch
  pull_request:
    branches:
      - main  # Trigger on pull requests to the main branch

jobs:
        
  build:
    runs-on: macos-latest  # Use a macOS runner to build the Xcode project
    steps:
      - name: Check out the repository
        uses: actions/checkout@v2
      - name: List available schemes
        run: /Applications/Xcode_16.2.app/Contents/Developer/usr/bin/xcodebuild -list
      - name: Build the Xcode project
        run: |
         /Applications/Xcode_16.2.app/Contents/Developer/usr/bin/xcodebuild -project Morning.xcodeproj -scheme Morning-Rem -configuration Release clean build
          # Replace YourProject.xcodeproj with your actual project file and YourScheme with your build scheme

      - name: Upload build artifacts (optional)
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build
          path: .

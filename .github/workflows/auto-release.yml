name: Build Xcode Project

on:
  push:
    branches:
      - main  # Trigger on push to the main branch
  pull_request:
    branches:
      - main  # Trigger on pull requests to the main branch

jobs:

  setup:
    runs-on: macos-latest
    steps:
      - name: Set Up Xcode
        run: sudo xcode-select --switch /Applications/Xcode_16.2.app  # Specify Xcode 16.2 here
        
  build:
    runs-on: macos-latest  # Use a macOS runner to build the Xcode project
    needs: setup
    steps:
      - name: Check out the repository
        uses: actions/checkout@v2

      - name: Set up Xcode
        run: sudo xcode-select --switch /Applications/Xcode_16.2.app  # Switch to Xcode 16.2

      - name: Build the Xcode project
        run: |
          xcodebuild -project Morning.xcodeproj -scheme "Morning-Rem" -configuration Release clean build
          # Replace Morning.xcodeproj with your actual project file if needed
          
      - name: Upload build artifacts (optional)
        uses: actions/upload-artifact@v2
        with:
          name: build
          path: .
